" href="feed-spotlight.xml"><title>Smart Money Digest</title><style>
/* Smart Money Digest reader. Light by default; dark via [data-theme="dark"].
   Same design system as the Alpha Funnel reader, distinct palette (ledger green). */
:root{
  --bg:#faf9f6; --card:#ffffff; --ink:#1a1c1a; --muted:#6d6f6a; --faint:#747670;
  --line:#e5e4dc; --line2:#edece5; --accent:#1c7a4f; --accent-soft:#e7f3ec;
  --on-accent:#ffffff;
  --zoom:#9a6b00; --zoom-bg:#fbf2dc; --chip:#f0efe8; --chip-ink:#484a45;
  --maxw:720px;
  --serif:"Iowan Old Style",Georgia,"Times New Roman",serif;
  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}
:root[data-theme="dark"]{
  --bg:#0e1311; --card:#151c18; --ink:#e7ece9; --muted:#9aaaa2; --faint:#84948c;
  --line:#243330; --line2:#1e2a26; --accent:#4fc38a; --accent-soft:#12291e;
  --on-accent:#0e1311;
  --zoom:#ffd479; --zoom-bg:#2a2414; --chip:#1b2620; --chip-ink:#a8b8ae;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
  font:17px/1.65 var(--sans);-webkit-font-smoothing:antialiased;overflow-x:hidden}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}
/* visible keyboard focus for all interactive elements */
a:focus-visible,button:focus-visible,.chip:focus-visible,
.scard:focus-visible,.row:focus-visible,.featured:focus-visible{
  outline:2px solid var(--accent);outline-offset:2px;border-radius:8px}
@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{transition:none!important;animation:none!important;scroll-behavior:auto!important}
  .scard:hover{transform:none}
}
.wrap{max-width:var(--maxw);margin:0 auto;padding:0 22px 140px}
.muted{color:var(--muted)}
.empty{color:var(--muted);font-size:15px;line-height:1.7}

/* top bar */
.topbar{display:flex;align-items:center;gap:10px;padding:22px 0 16px;flex-wrap:wrap;
  position:sticky;top:0;z-index:20;background:var(--bg);border-bottom:1px solid var(--line)}
a.brand{font-weight:700;letter-spacing:.2px;color:var(--ink);cursor:pointer}
a.brand:hover{text-decoration:none;opacity:.62}
/* the tier nav must never set the page width: on narrow screens it slides
   sideways (scrollbar hidden) while the article body fits the viewport */
.chan-nav{display:flex;align-items:center;gap:2px;min-width:0;max-width:100%;
  overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.chan-nav::-webkit-scrollbar{display:none}
.chan-nav .sep{color:var(--faint);font-weight:400;pointer-events:none;margin:0 1px}
.chan-nav .chan{font-size:14.5px;color:var(--muted);padding:2px 9px;border-radius:7px;cursor:pointer;white-space:nowrap}
.chan-nav .chan:hover{color:var(--ink);text-decoration:none;background:var(--chip)}
.chan-nav .chan.active{color:var(--ink);font-weight:600}
.back{display:inline-block;font-size:15px;color:var(--muted);margin:2px 0 4px}
.back:hover{color:var(--ink);text-decoration:none}
.spacer{flex:1}
.theme-toggle{border:1px solid var(--line);background:var(--card);color:var(--muted);
  width:34px;height:34px;border-radius:9px;cursor:pointer;font-size:15px;line-height:1;padding:0}
.theme-toggle:hover{color:var(--ink);border-color:var(--faint)}
.t-ico::before{content:"☾"}
:root[data-theme="dark"] .t-ico::before{content:"☀"}
.topbar.minimal{border-bottom:none}

/* tier blurb (one line under the topbar on list views) */
.tier-blurb{font-size:14.5px;color:var(--muted);margin:14px 0 10px}

/* splash / home — one long full-width card per tier stacked vertically.
   Card: tier name + date on the left, full headline on the right. */
.wrap.splash{min-height:100dvh;display:flex;flex-direction:column;padding-bottom:22px;overflow:visible}
.splash-main{flex:1;min-height:0;display:flex;align-items:flex-start;justify-content:center;padding:4px 0}
.splash-inner{width:100%}
.splash-cards{display:grid;grid-template-columns:1fr;gap:10px}
.scard{display:flex;align-items:center;gap:26px;padding:20px 28px;
  border:1px solid var(--line);border-radius:16px;overflow:hidden;
  background:var(--card);color:var(--ink);
  transition:border-color .15s ease,transform .15s ease,box-shadow .15s ease}
.scard:hover{border-color:var(--faint);transform:translateY(-2px);text-decoration:none;
  box-shadow:0 12px 30px rgba(14,20,16,.09)}
:root[data-theme="dark"] .scard:hover{box-shadow:0 12px 30px rgba(0,0,0,.4)}
.scard .s-meta{flex:0 0 190px;display:flex;flex-direction:column;gap:3px}
.scard .s-name{font-weight:700;font-size:21px;letter-spacing:.2px}
.scard .s-date{color:var(--muted);font-size:13.5px;font-weight:500}
/* reserve lines so every card is the same height regardless of headline length */
.scard .s-head{flex:1;font:400 22px/1.35 var(--serif);color:var(--ink);min-height:2.7em}
.scard-empty{opacity:.55;cursor:default}
.scard .s-blurb{font:400 16px/1.5 var(--sans);color:var(--muted)}
.scard-wrap{display:flex;flex-direction:column}
.splash-foot{display:flex;justify-content:flex-end;margin-top:12px}
.whatis{border:1px solid var(--line);background:var(--card);color:var(--muted);
  font:500 13px var(--sans);padding:7px 13px;border-radius:9px;cursor:pointer}
.whatis:hover{color:var(--ink);border-color:var(--faint)}
@media(max-width:640px){
  .wrap.splash{height:auto;min-height:100dvh;overflow:visible}
  .splash-main{padding:16px 0}
  .scard{flex-direction:column;align-items:flex-start;gap:10px;padding:16px 18px}
  .scard .s-meta{flex:none}
  .scard .s-head{font-size:19px;min-height:0}
}

/* filters */
.filters{border-top:1px solid var(--line);border-bottom:1px solid var(--line);
  padding:16px 0 18px;margin-bottom:34px}
.filter-group{display:flex;align-items:baseline;gap:12px;margin:8px 0}
.filter-label{flex:0 0 58px;font-size:12px;text-transform:uppercase;letter-spacing:.7px;
  color:var(--faint);padding-top:5px}
.chips{display:flex;flex-wrap:wrap;gap:7px}
.chip{font:inherit;font-size:13px;padding:4px 11px;border-radius:999px;cursor:pointer;
  border:1px solid var(--line);background:var(--chip);color:var(--chip-ink);white-space:nowrap}
.chip:hover{border-color:var(--faint);color:var(--ink)}
.chip.active{background:var(--accent);border-color:var(--accent);color:var(--on-accent)}
.chip.active .ct{color:color-mix(in srgb,var(--on-accent) 72%,transparent)}
.chip .ct{color:var(--faint)}
.chip.more{background:transparent;border-style:dashed;color:var(--muted)}
.filter-note{margin-top:14px;font-size:14px;color:var(--muted)}
.filter-note strong{color:var(--ink)}
.clear{font:inherit;font-size:13px;margin-left:8px;border:none;background:none;color:var(--accent);cursor:pointer}
.clear:hover{text-decoration:underline}

/* featured (latest) */
.featured{display:block;color:inherit;padding:4px 0 30px;margin-bottom:28px;
  border-bottom:1px solid var(--line)}
.featured:hover{text-decoration:none}
.kicker{font-size:12.5px;text-transform:uppercase;letter-spacing:.8px;color:var(--faint);margin-bottom:12px}
.f-title{font:600 33px/1.18 var(--serif);margin:0 0 14px;letter-spacing:-.01em}
.featured:hover .f-title{color:var(--accent)}
.f-sub{font-size:18px;line-height:1.55;color:var(--muted);margin:0 0 16px;max-width:62ch}
.f-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.tg{font-size:12px;color:var(--faint);border:1px solid var(--line);border-radius:6px;padding:2px 8px;
  font-variant-numeric:tabular-nums}
a.tg:hover{color:var(--ink);border-color:var(--faint);text-decoration:none}
.keepreading{font-size:15px;color:var(--accent);font-weight:500}

/* the dated list */
.list{display:flex;flex-direction:column}
.row{display:flex;gap:18px;align-items:baseline;color:inherit;padding:13px 0;
  border-bottom:1px solid var(--line2)}
.row:hover{text-decoration:none}
.r-date{flex:0 0 92px;font-size:13.5px;color:var(--faint);font-variant-numeric:tabular-nums}
.r-title{font:500 18px/1.4 var(--serif)}
.row:hover .r-title{color:var(--accent)}

/* reading view */
.read .topbar{margin-bottom:6px}
.article{padding-top:8px}
.a-title{font:600 32px/1.2 var(--serif);margin:6px 0 14px;letter-spacing:-.01em}
.a-sub{font-size:18px;line-height:1.55;color:var(--muted);margin:0 0 16px;max-width:62ch}
.a-tags{display:flex;flex-wrap:wrap;gap:6px}
.article hr{border:none;border-top:1px solid var(--line);margin:22px 0 6px}

/* "In this piece" jump list */
.toc{border:1px solid var(--line);border-radius:12px;padding:14px 18px;margin:2px 0 26px;background:var(--card)}
.toc-h{font-size:12px;text-transform:uppercase;letter-spacing:.7px;color:var(--faint);margin-bottom:8px}
.toc ul{margin:0;padding-left:18px}
.toc li{margin:5px 0}
.toc a{color:var(--muted);font-size:15px}
.toc a:hover{color:var(--ink)}

/* rendered markdown body */
.body{font-size:17px;max-width:68ch}
.body h2{font:600 21px/1.3 var(--serif);margin:34px 0 12px;padding-top:18px;border-top:1px solid var(--line);
  scroll-margin-top:76px}   /* clear the sticky topbar when jumping to a section */
.body h3{font:600 17px/1.35 var(--sans);margin:22px 0 8px;color:var(--ink)}
.body p{margin:14px 0}
.body ul{padding-left:22px}.body li{margin:7px 0}
.body strong{color:var(--ink);font-weight:680}
.body em{color:var(--muted)}
.body hr{border:none;border-top:1px solid var(--line);margin:26px 0}
.body blockquote{border-left:3px solid var(--line);margin:14px 0;padding:2px 16px;color:var(--muted)}
.body code{background:var(--chip);padding:1px 6px;border-radius:5px;font-size:.9em}

/* links inside the body */
.xlink{color:var(--accent);border-bottom:1px dashed var(--accent)}
a.cite-sec{color:var(--zoom);text-decoration:underline;
  text-decoration-color:color-mix(in srgb,var(--zoom) 45%,transparent);text-underline-offset:2px}
a.cite-sec::after{content:"§";font-size:.72em;vertical-align:super;margin-left:2px;opacity:.85}
a.cite-plain{color:var(--accent);text-decoration:underline;
  text-decoration-color:color-mix(in srgb,var(--accent) 45%,transparent);text-underline-offset:2px}
/* bold tickers in the body — scannable, distinct from links (no underline) */
.cashtag{font-weight:650;color:var(--ink);font-variant-numeric:tabular-nums;
  background:var(--chip);border-radius:4px;padding:0 3px}
.cashtag.clickable{cursor:pointer}
.cashtag.clickable:hover{color:var(--accent)}
.cashtag.clickable:focus-visible{outline:2px solid var(--accent);outline-offset:2px}

/* drawer (search / subscribe / what-is-this / shortcuts) */
.drawer{position:fixed;top:0;right:0;height:100dvh;width:min(560px,94vw);z-index:40;
  background:var(--card);border-left:1px solid var(--line);transform:translateX(100%);
  transition:transform .22s ease;display:flex;flex-direction:column;box-shadow:-24px 0 60px rgba(0,0,0,.16)}
:root[data-theme="dark"] .drawer{box-shadow:-24px 0 60px rgba(0,0,0,.5)}
.drawer.open{transform:translateX(0)}
.drawer-head{display:flex;align-items:center;gap:12px;padding:14px 18px;border-bottom:1px solid var(--line)}
.drawer-tag{font-size:11px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;
  color:var(--on-accent);background:var(--accent);padding:3px 9px;border-radius:6px}
.drawer-source{font-size:13px;color:var(--muted)}
.drawer-close{margin-left:auto;background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer}
.drawer-close:hover{color:var(--ink)}
.drawer-body{overflow:auto;padding:20px 24px 70px;flex:1;font-size:16px}
.drawer-body h1{font:600 21px/1.3 var(--serif)}
.drawer-body h2{font:600 17px/1.35 var(--serif);margin:20px 0 8px}
.drawer-body h3{font-size:15px}
.drawer-body code{background:var(--chip);padding:2px 6px;border-radius:5px;color:var(--zoom);
  user-select:all;display:inline-block;margin-top:6px}
.scrim{position:fixed;inset:0;background:rgba(14,20,16,.32);z-index:35}
:root[data-theme="dark"] .scrim{background:rgba(0,0,0,.5)}

/* a11y, search, shortcuts, markers, progress, share */
.skip{position:fixed;top:-48px;left:10px;z-index:70;background:var(--accent);color:var(--on-accent);
  padding:8px 14px;border-radius:8px;font:600 14px var(--sans);transition:top .15s ease}
.skip:focus{top:10px;text-decoration:none}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0 0 0 0);white-space:nowrap;border:0}
#main:focus{outline:none}
/* reading-progress bar */
#readbar{position:fixed;top:0;left:0;height:3px;width:0;background:var(--accent);z-index:60;transition:width .12s linear}
/* "new since last visit" dots */
.ndot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--accent);vertical-align:middle}
.chan .ndot{width:6px;height:6px;margin-left:5px}
/* topbar icon button (search) matches the theme toggle */
.icon-btn{border:1px solid var(--line);background:var(--card);color:var(--muted);
  width:34px;height:34px;border-radius:9px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;padding:0}
.icon-btn:hover{color:var(--ink);border-color:var(--faint)}
/* search drawer */
.search-input{width:100%;font:400 16px var(--sans);padding:10px 12px;border:1px solid var(--line);
  border-radius:10px;background:var(--bg);color:var(--ink)}
.search-input:focus{outline:none;border-color:var(--accent)}
.search-results{margin-top:12px;display:flex;flex-direction:column}
.sr-row{display:flex;flex-direction:column;gap:2px;padding:10px 2px;border-bottom:1px solid var(--line2);color:inherit}
.sr-row:hover{text-decoration:none}
.sr-row:hover .sr-title{color:var(--accent)}
.sr-meta{font-size:12px;color:var(--muted)}
.sr-title{font:500 15px/1.35 var(--serif)}
/* shortcuts help */
.kbd-list{display:grid;grid-template-columns:auto 1fr;gap:10px 16px;align-items:baseline;margin:6px 0}
.kbd-list dt{margin:0}.kbd-list dd{margin:0;color:var(--muted);font-size:14px}
kbd{font:600 12px var(--sans);background:var(--chip);color:var(--ink);border:1px solid var(--line);
  border-bottom-width:2px;border-radius:6px;padding:2px 7px;white-space:nowrap}
.wi-tip{font-size:13px;color:var(--muted)}
/* share button in the reading-view kicker */
.article .kicker{display:flex;align-items:center;gap:10px}
.share-btn{margin-left:auto;border:1px solid var(--line);background:var(--card);color:var(--muted);
  font:600 12px var(--sans);letter-spacing:normal;text-transform:none;padding:5px 12px;border-radius:8px;cursor:pointer}
.share-btn:hover{color:var(--ink);border-color:var(--faint)}
/* scroll-spy active TOC entry */
.toc a.active{color:var(--ink);font-weight:600}

/* print: strip the chrome, keep the article, surface citation URLs on paper */
@media print{
  .topbar,.chan-nav,.filters,.edition-nav,.toc,.sub-btn,.icon-btn,.theme-toggle,
  .back,.drawer,.scrim,.skip,#readbar,.share-btn,.splash-foot,.tier-blurb{display:none!important}
  html,body{background:#fff;color:#000}
  .wrap{max-width:none;padding:0}
  a{color:#000}
  .body a[href^="http"]::after{content:" (" attr(href) ")";font-size:.82em;color:#444}
  .cashtag{background:none;padding:0}
  .body h2,.a-title{break-after:avoid}
}

/* subscribe button (topbar) */
.sub-btn{border:1px solid var(--line);background:var(--card);color:var(--muted);
  font:600 12.5px var(--sans);padding:6px 12px;border-radius:9px;cursor:pointer;white-space:nowrap}
.sub-btn:hover{color:var(--ink);border-color:var(--faint)}

/* subscribe drawer contents */
.sub-list{display:flex;flex-direction:column;gap:8px;margin:16px 0 6px}
.sub-row{display:flex;align-items:center;gap:12px;border:1px solid var(--line);
  border-radius:10px;padding:10px 12px}
.sub-row-main{display:flex;flex-direction:column;gap:3px;min-width:0;flex:1}
.sub-name{font-weight:600;font-size:14px}
.sub-url{font-size:12px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sub-copy{flex:0 0 auto;border:1px solid var(--line);background:var(--chip);color:var(--ink);
  font:600 12px var(--sans);padding:5px 12px;border-radius:8px;cursor:pointer}
.sub-copy:hover{border-color:var(--faint)}
.sub-copy.done{color:var(--accent);border-color:var(--accent)}
.sub-hint{font-size:13px;color:var(--muted);margin-top:12px}

/* prev/next piece nav (reading view) */
.edition-nav{display:flex;justify-content:space-between;gap:16px;margin:36px 0 0;
  padding-top:18px;border-top:1px solid var(--line)}
.edition-nav a{font-size:14px;color:var(--muted)}
.edition-nav a:hover{color:var(--ink);text-decoration:none}
.edition-nav .ed-next{margin-left:auto;text-align:right}

@media (max-width:560px){
  .f-title{font-size:27px}.a-title{font-size:26px}
  .r-date{flex-basis:78px}
  .filter-group{flex-direction:column;gap:6px}
}

<script>const DATA={"tiers": [{"key": "daily", "label": "Daily Tape", "blurb": "Fresh activist 13Ds and conviction insider buys, trading-day mornings.", "days": [{"id": "2026-07-04", "date": "2026-07-04", "headline": "Wallbox's board and CEO just bought $5M together, and Uber quietly put $20M into Lime", "subtitle": "A board-plus-CEO cluster at multi-year lows is the only print that matters on a sleepy holiday tape. Two biotech 13Ds and a $6M director buy round it out.", "tickers": ["CALC", "PASG", "LFCR", "WBX", "CREX", "PSNY", "LIME", "BNR", "HDSN", "BBD", "PSBD", "BRT", "OLP"], "funds": ["Bering Partners", "Lynx1 Capital", "22NW", "Legion Partners", "Uber", "Hartree Partners"], "body": "**Headline:** Wallbox's board and CEO just bought $5M together, and Uber quietly put $20M into Lime\n**Subtitle:** A board-plus-CEO cluster at multi-year lows is the only print that matters on a sleepy holiday tape. Two biotech 13Ds and a $6M director buy round it out.\n**Tickers:** CALC, PASG, LFCR, WBX, CREX, PSNY, LIME, BNR, HDSN, BBD, PSBD, BRT, OLP\n**Funds:** Bering Partners, Lynx1 Capital, 22NW, Legion Partners, Uber, Hartree Partners\n\n# Daily Tape - July 4, 2026\n\nQuiet holiday wire. No whale 13Ds, no early 13Fs, no Burry sightings. But one insider print today is the kind I actually care about, so let's get to it.\n\n## The only real story: WBX\n\n**WBX** (Wallbox N.V.). Four insiders bought ~$5.0M of the EV-charging maker on the same day. Three directors at **$1.36M each**, plus CEO Enric Asuncion Escorsa adding **$887k** of his own. That is a cluster buy (multiple insiders buying together, the strongest insider signal there is), it is board-plus-CEO in unison, and it lands with the stock near multi-year lows. Insiders don't coordinate seven figures each into a falling chart for fun. Highest-conviction print on the tape, not close.\n\n## Fresh 13Ds\n\nA 13D is an activist-scale stake, 5% or more with intent to do something about it. Two crossed today, both concentrated biotech money bottom-fishing:\n\n- **CALC** (CalciMedica). Bering Partners II GP filed a new SCHEDULE 13D on the immunology small-cap. First-time activist-scale money in a name this size gets my attention. [Filing](https://www.sec.gov/Archives/edgar/data/1811744/0001193125-26-295162-index.html)\n- **PASG** (Passage BIO). Lynx1 Capital Management opened a 13D on the gene-therapy name that has spent the year trading near cash value. Someone just decided the bottom of the range is investable. [Filing](https://www.sec.gov/Archives/edgar/data/1910456/0000902664-26-003000-index.html)\n\nThe rest of today's 13D wire was plumbing and I'm not making you read it: Gould Investors' twin filings on **BRT** Apartments and **OLP** (internal, affiliated), a Jefferies-to-Jefferies BDC shuffle, and a Hugreat/Alpex SPAC stake. Skip.\n\nOne amendment I do care about: **LFCR** (Lifecore Biomedical) drew same-day 13D/A activity from *both* 22NW and Legion Partners. No fresh escalation disclosed, but two activists touching the same small-cap on the same day means the seat-holders are still working.\n\n## The rest of the insider tape\n\n- **CREX** (Creative Realities). CEO Richard Mills bought **$700k** and CFO Tamra Koshewa **$100k** of the digital-signage micro-cap at $3.50. An $800k C-suite cluster in a company this small is real money to these people.\n- **LIME** (Neutron Holdings). **Uber** put **$20M** to work, 800k shares at $25, lifting its stake in the micromobility operator. A strategic corporate buyer averaging UP is a different animal than an insider buy, and the size demands notice.\n- **BNR** (Burning Rock Biotech). Director Yusheng Han disclosed **$6.2M** of open-market buying across the June 11 session in the China cancer-diagnostics name.\n- **HDSN** (Hudson Technologies). Hartree Partners, already a 10% owner, added **$4.5M** of the refrigerant reclaimer at ~$5.85.\n- **BBD** (Bank Bradesco). CLO Julio Cesar Bueno bought **$2.0M** of the Brazilian bank.\n- **PSBD** (Palmer Square Capital BDC). 10% owner Martin Bicknell added **$845k** near $10.55.\n- **PSNY** (Polestar). Three directors added a combined ~$78k. Small, but board buying is board buying.\n\n*Data window 2026-07-02 to 2026-07-04. Not investment advice.*\n"}]}, {"key": "weekly", "label": "Pattern Watch", "blurb": "Saturday analysis: repeat buyers, escalations, cross-day patterns.", "days": []}, {"key": "quarterly", "label": "13F Deep Dive", "blurb": "The flagship cross-fund read after each quarter's 13F flood.", "days": [{"id": "2026-07-04", "date": "2026-07-04", "headline": "The whales are rotating within the AI trade, not out of it", "subtitle": "Q1 13Fs across 17 famous funds: out of software mega-caps, into chips, memory, and power. Alphabet is the quiet consensus buy, Ackman went the other way, and Druckenmiller is betting on Argentina.", "tickers": ["MSFT", "GOOGL", "TSM", "MU", "SNDK", "STX", "AMAT", "KLAC", "TER", "EQIX", "ASML", "VST", "TLN", "WULF", "GEV", "DAL", "LEN", "NYT", "YPF", "ARGT", "KKR", "SPOT", "ALKT", "CNTA", "OPI", "MANU", "NNDM", "PASG", "SPG", "WBX", "PSNY", "NVCT", "CREX", "LIME", "HDSN", "BBD"], "funds": ["Berkshire", "Pershing Square", "Tiger Global", "Appaloosa", "Bridgewater", "Coatue", "Lone Pine", "Third Point", "Duquesne", "Elliott", "DME Capital", "ValueAct", "Scion", "JANA Partners", "Farallon", "Trian", "Icahn"], "body": "**Headline:** The whales are rotating within the AI trade, not out of it\n**Subtitle:** Q1 13Fs across 17 famous funds: out of software mega-caps, into chips, memory, and power. Alphabet is the quiet consensus buy, Ackman went the other way, and Druckenmiller is betting on Argentina.\n**Tickers:** MSFT, GOOGL, TSM, MU, SNDK, STX, AMAT, KLAC, TER, EQIX, ASML, VST, TLN, WULF, GEV, DAL, LEN, NYT, YPF, ARGT, KKR, SPOT, ALKT, CNTA, OPI, MANU, NNDM, PASG, SPG, WBX, PSNY, NVCT, CREX, LIME, HDSN, BBD\n**Funds:** Berkshire, Pershing Square, Tiger Global, Appaloosa, Bridgewater, Coatue, Lone Pine, Third Point, Duquesne, Elliott, DME Capital, ValueAct, Scion, JANA Partners, Farallon, Trian, Icahn\n\n# Smart Money Digest - July 4, 2026\n\n*What billionaire investors are actually doing, straight from SEC EDGAR: 13F holdings changes across 17 famous funds, fresh activist stakes, and insider open-market buys. First edition, so this one sets the baseline.*\n\n---\n\n## The TLDR\n\n- **The whales are rotating within the AI trade, not out of it.** They sold the software mega-caps (Microsoft, Salesforce, Oracle, Snowflake) and bought the physical layer: chips, memory, fab equipment, data centers, and the power to run them.\n- **Alphabet is the quiet consensus buy.** Berkshire tripled its stake to $15.6B. Third Point, Lone Pine, and Bridgewater all opened or added.\n- **Ackman went the other way**, opening a new $2.1B Microsoft position (15% of his book) while everyone else trimmed it.\n- **Druckenmiller is betting on Argentina.** YPF up +433%, plus a new Argentina ETF position.\n- **Insider tape this week:** the entire Simon Property board bought stock together, and EV-charging maker Wallbox saw its CEO plus three directors buy $5M at once.\n\n---\n\n## 1. The big rotation: out of software, into silicon and power\n\nA 13F is the quarterly holdings snapshot big funds are forced to file, and the Q1 batch (positions as of March 31, filed mid-May) has one pattern that jumps off the page. A bunch of unrelated funds made the *same* trade.\n\n**They sold software mega-caps.** Microsoft got trimmed \u221254% by Tiger Global and \u221282% by Tepper, and Lone Pine and Third Point exited entirely. Bridgewater dumped Salesforce ($512M), Workday, and ServiceNow outright. Coatue exited Oracle ($865M), Snowflake ($544M), Adobe, AMD, and Arm.\n\n**They bought AI hardware, memory, and fab equipment.** TSMC: Tiger +49% to $1.9B, Bridgewater opened a new $364M position, and Coatue holds it as their #1 at 10.8% of book. Memory is everywhere: Tepper made Micron his #2 holding (9.5%) and opened Sandisk, Druckenmiller opened Sandisk *and* Seagate, Bridgewater added Micron +66%, Coatue opened Micron. Equipment too: Tiger added Applied Materials +85%, Bridgewater added KLA +39%, Teradyne +70%, and Credo +220%, and Lone Pine opened a $555M Teradyne position. Coatue opened a **$1.1B Equinix** (data center REIT) position and $655M of ASML.\n\n**They bought the power layer.** Vistra: Tepper +114%, and Lone Pine holds it as their #1 position. Lone Pine also added Talen Energy +41% and opened TeraWulf, Hut 8, and Argan (a power plant builder). That is a straight \"who builds and feeds data centers\" basket. Coatue's #2 holding is GE Vernova at 7.7% of book.\n\n**My read:** the smart money is not calling the AI trade over. They're calling the *software* part crowded and moving down the stack to compute, memory, and electricity. Retail is still arguing about chatbot subscriptions.\n\n## 2. The Alphabet accumulation\n\n- **Berkshire** added +204% to GOOGL. It's now a $15.6B position, 5.9% of the book, their 7th largest. They also opened a smaller new GOOG lot while exiting Visa, Mastercard, UnitedHealth, and Domino's.\n- **Third Point** and **Lone Pine** opened new GOOGL positions. **Bridgewater** added +26% and opened GOOG.\n- The counterpoint: Coatue trimmed \u221237% and Pershing Square nearly exited (\u221295%). So it's not unanimous. But look at the buyer list. That's heavyweight money.\n\n## 3. Contrarian corner\n\n- **Ackman (Pershing Square): new $2.1B Microsoft position**, 15.3% of his concentrated 11-stock book, initiated exactly while Tiger, Tepper, Lone Pine, and Third Point were cutting it. He also exited Hilton and nearly exited Alphabet. Someone is wrong here, and Ackman is fine being the one to find out.\n- **Buffett bought an airline again.** New $2.6B Delta position, from the man who famously swore off airlines in 2020. He also added Lennar +43% (homebuilder value) and NYT +199%.\n- **Burry watch:** Scion's last 13F is still Q3 2025. It was 66% Palantir puts and 13.5% Nvidia puts (a put is a bet the stock FALLS, a short), and he hasn't filed since. He deregistered. No current data, but remember the biggest AI skeptic went dark holding shorts.\n- **Elliott** is positioned for trouble: new puts on consumer discretionary (XLY), high-yield credit (HYG), and small caps (IWM), plus new gold-miner calls (GDX). Meanwhile they hold Phillips 66 and Suncor as top longs and added HPE +47%.\n- **Einhorn (now filing as DME Capital):** new positions in Versant Media ($112M), Crocs, and Resideo, still 19% Green Brick Partners.\n- **ValueAct:** opened KKR ($303M, 5.3% of book), Spotify ($174M), and Wix.\n- **Druckenmiller:** the Argentina bet (YPF +433%, new ARGT ETF), his #1 is still Natera at 18% of book, he added STMicro +238%, and he exited his XLF financials hedge.\n\n## 4. Activist corner (fresh 13Ds, these are near-real-time)\n\nA 13D means someone crossed 5% of a company and intends to make noise about it. New ones in the last two weeks:\n\n- **JANA Partners \u2192 Alkami Technology (ALKT)**, a proven activist targeting a bank-software vendor (June 29)\n- **Farallon \u2192 Centessa Pharmaceuticals (CNTA)** (June 24)\n- **Two funds hit Office Properties Income Trust (OPI) on the same day**, Helix Partners and Redwood Capital (June 25). A distressed office REIT with two activists circling at once.\n- **INEOS \u2192 Manchester United (MANU)**, Ratcliffe consolidating (June 29)\n- **Tang Capital \u2192 Nano Dimension (NNDM)** (June 30). Tang also bought $806k of Boundless Bio (BOLD) stock this week per Form 4.\n- **Lynx1 \u2192 Passage Bio (PASG)**, and **Perceptive + ARCH \u2192 Kardigan** (private-to-be-public biotech)\n\nAmendments where existing campaigns are moving: Trian at Janus Henderson, Elliott at Triple Flag Precious Metals, Toyota at Joby Aviation, Biglari at El Pollo Loco, D.E. Shaw at Gossamer Bio, and Legion plus 22NW both in Lifecore Biomedical.\n\n## 5. Insider conviction buys (Form 4, open-market purchases only, July 1\u20132 filings)\n\nCluster buys first (multiple insiders buying together, the strongest insider signal there is):\n\n- **Simon Property Group (SPG): 9 directors bought simultaneously** (~$478k total). A board-wide buy at a blue-chip mall REIT almost never happens.\n- **Wallbox (WBX): CEO + 3 directors bought $5M** in the EV-charging maker (June 30)\n- **Polestar (PSNY): 6 directors and officers bought** (~$256k)\n- **Nuvectis Pharma (NVCT): 2 insiders, $1.2M.** CEO Bentsur put in $500k and a 10% owner $916k.\n- **Creative Realities (CREX): the CEO bought $700k** (200k shares at $3.50) alongside the CFO, *and* the same CEO filed a 13D/A this week. Micro-cap, but these insiders are acting like owners.\n\nNotable large singles: **Uber added $20M to Lime** (Neutron Holdings, the pre-IPO scooter company, and Uber is averaging up as a 10% owner). RH director Carlos Alberini bought $1.8M. Hartree Partners added $4.5M of Hudson Technologies (HDSN). Bradesco's CLO bought $2M of BBD.\n\n## 6. What retail isn't looking at yet\n\n1. **Memory and storage as the AI bottleneck trade.** Micron, Sandisk, and Seagate showing up as *new* positions across four unrelated whale books is the closest thing to a coordinated signal in this data.\n2. **Power infrastructure as a compounding theme, not a meme.** Vistra, Talen, GE Vernova, Argan, TeraWulf, across multiple books, and the whales keep sizing it up while retail just talks about it.\n3. **Argentina.** Druckenmiller quintupling YPF and buying the country ETF is a macro bet almost nobody retail-side is positioned for.\n4. **Office real estate distress as an activist hunting ground.** Two funds filing 13Ds on OPI the same day tells me the bottom-fishing has started.\n5. **Boards buying their own beaten-down names** (SPG, WBX, PSNY) while the indices sit near highs. Insiders see value exactly where the narrative is coldest.\n\n---\n\n## Caveats, because I'm honest about the lag\n\n- The 13F data is as of **March 31, 2026** (filed May 15). That's the latest legally available snapshot and it's ~3 months stale. Positions may have changed. 13Fs also omit shorts, bonds, and non-US-listed holdings (Burry's book was mostly *puts*, which do show, while Elliott's activist positions are often in derivatives that don't).\n- The 13D and Form 4 data is current through **July 2** (July 3\u20134 was the market holiday).\n- Dollar values for 13F positions are at quarter-end prices.\n- This is data plus pattern-reading, not investment advice.\n\n*The watchlist: Berkshire, Scion, Pershing Square, Duquesne, Appaloosa, Baupost, Third Point, Greenlight/DME, Icahn, Elliott, Starboard, ValueAct, Coatue, Lone Pine, Tiger Global, Bridgewater, Soros.*\n"}]}, {"key": "spotlight", "label": "Fund Spotlights", "blurb": "One famous fund's quarter, close up.", "days": []}]};</script>
<script>
'use strict';
/* Smart Money Digest — four-tier reader (Daily Tape / Pattern Watch / 13F Deep Dive /
   Fund Spotlights). Forked from the Alpha Funnel reader; works two ways from ONE codebase:
   - standalone digest.html: a global `DATA` is embedded (days carry `body`).
   - served site/: no DATA, so we fetch manifest.json and lazy-load piece bodies. */

const EMBEDDED = (typeof DATA !== 'undefined') ? DATA : null;

const TOP_CHIPS = 15; // chips shown per filter row before "show all"

let TIERS = [];          // [{key, label, blurb, days:[{id,date,headline,subtitle,tickers,funds,path?,body?}]}]
let T_BY_KEY = {};       // key -> tier object
let activeKey = null;    // current tier key

let state = { filter: null, showAllTickers: false, showAllFunds: false }; // filter = {kind:'ticker'|'fund', value} | null
let SEEN = new Set();    // "key/id" of pieces already opened (persisted to localStorage smd-seen)

const elDrawer = () => document.getElementById('drawer');
const elScrim = () => document.getElementById('scrim');

marked.setOptions({ breaks: false, gfm: true });

init();

async function init() {
  initTheme();
  try {
    let src;
    if (EMBEDDED) {
      src = EMBEDDED;
    } else {
      src = await fetchJSON('manifest.json');
    }
    TIERS = (src.tiers || []).map(t => ({ ...t, days: (t.days || []).slice() }));
  } catch (e) {
    document.getElementById('app').innerHTML =
      `<div class="wrap"><p class="empty">Couldn't load the digest. (${esc(String(e))})</p></div>`;
    return;
  }
  if (!TIERS.length) {
    document.getElementById('app').innerHTML =
      `<div class="wrap"><p class="empty">No tiers found.</p></div>`;
    return;
  }
  TIERS.forEach(t => {
    t.days.sort((a, b) => b.date.localeCompare(a.date));   // newest first
    T_BY_KEY[t.key] = t;
  });
  activeKey = TIERS[0].key; // default tier (Daily Tape)
  loadSeen();

  document.getElementById('drawerClose').addEventListener('click', closeDrawer);
  elScrim().addEventListener('click', closeDrawer);
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDrawer(); });
  document.addEventListener('keydown', keyNav);
  document.addEventListener('keydown', trapTab);
  window.addEventListener('scroll', onReadScroll, { passive: true });
  const skip = document.querySelector('.skip');
  if (skip) skip.addEventListener('click', e => {
    e.preventDefault();
    const mn = document.getElementById('main');
    if (mn) { mn.focus(); mn.scrollIntoView(); }
  });
  window.addEventListener('hashchange', route);
  route();
}

/* ---------- "new since last visit" tracking (localStorage) ---------- */
function loadSeen() {
  let raw = null;
  try { raw = localStorage.getItem('smd-seen'); } catch (e) {}
  if (raw == null) {
    // first ever visit: seed with every current piece so nothing shows as falsely "new"
    TIERS.forEach(t => t.days.forEach(d => SEEN.add(t.key + '/' + d.id)));
    persistSeen();
  } else {
    try { (JSON.parse(raw) || []).forEach(k => SEEN.add(k)); } catch (e) {}
  }
}
function persistSeen() { try { localStorage.setItem('smd-seen', JSON.stringify([...SEEN])); } catch (e) {} }
function isNew(key, id) { return !SEEN.has(key + '/' + id); }
function markSeen(key, id) { if (isNew(key, id)) { SEEN.add(key + '/' + id); persistSeen(); } }
function tierHasNew(t) { return t.days.some(d => isNew(t.key, d.id)); }

function TI() { return T_BY_KEY[activeKey] || TIERS[0]; }

/* ---------- routing ---------- */
// #/<tier>            -> that tier's list
// #/<tier>/<date>     -> a reading view (date = 2026-07-04)
function route() {
  closeDrawer();   // any open drawer (search / what-is-this / subscribe) shouldn't linger across nav
  const m = (location.hash || '').match(/^#\/([a-z-]+)(?:\/(\d{4}-\d{2}-\d{2}))?$/);
  if (m && T_BY_KEY[m[1]]) {
    if (activeKey !== m[1]) { activeKey = m[1]; resetTierState(); }
    if (m[2] && TI().days.some(d => d.id === m[2])) {
      renderRead(m[2]); window.scrollTo(0, 0);
      const d = TI().days.find(x => x.id === m[2]);
      afterRoute(d ? d.headline : 'Reading'); return;
    }
    renderList(); window.scrollTo(0, 0); afterRoute(TI().label + ' pieces'); return;
  }
  renderSplash();          // home / index is the splash landing
  window.scrollTo(0, 0);
  afterRoute('Smart Money Digest home');
}

// SPA a11y: announce the new view to screen readers and move focus to the main landmark
function afterRoute(label) {
  const live = document.getElementById('live');
  if (live) live.textContent = label;
  const bar = document.getElementById('readbar');   // reset progress bar when leaving a reading view
  if (bar && !/^#\/[a-z-]+\/.+/.test(location.hash || '')) bar.style.width = '0%';
  const mainEl = document.getElementById('main');
  if (mainEl) { try { mainEl.focus({ preventScroll: true }); } catch (e) { mainEl.focus(); } }
}

function resetTierState() { state.filter = null; state.showAllTickers = false; state.showAllFunds = false; }

// friendly date: "2026-07-04" -> "Jul 4" (parsed manually to avoid TZ shifts)
function prettyDate(iso) {
  const MONTHS = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
  const m = /^(\d{4})-(\d{2})-(\d{2})$/.exec(iso || '');
  return m ? MONTHS[+m[2] - 1] + ' ' + (+m[3]) : (iso || '');
}
// long friendly date for the reading-view kicker: "2026-07-04" -> "July 4, 2026"
function prettyDateFull(iso) {
  const M = ['January', 'February', 'March', 'April', 'May', 'June', 'July',
    'August', 'September', 'October', 'November', 'December'];
  const m = /^(\d{4})-(\d{2})-(\d{2})$/.exec(iso || '');
  return m ? M[+m[2] - 1] + ' ' + (+m[3]) + ', ' + m[1] : (iso || '');
}

function go(hash) { location.hash = hash; }
function goTier(key) { if (key !== activeKey) go('#/' + key); }
function goHome() {
  if (location.hash === '' || location.hash === '#' || location.hash === '#/') {
    renderSplash(); window.scrollTo(0, 0);       // already home; just re-render
  } else {
    go('#/');                                     // hashchange -> route() -> renderSplash
  }
}
// Reading view: <- older piece, -> newer. List view: j/k move through pieces (Enter opens natively).
function keyNav(e) {
  if (e.metaKey || e.ctrlKey || e.altKey || e.defaultPrevented) return;
  const tag = (e.target && e.target.tagName) || '';
  if (tag === 'INPUT' || tag === 'TEXTAREA' || (e.target && e.target.isContentEditable)) return;
  if (elDrawer().classList.contains('open')) return;

  if (e.key === '/') { e.preventDefault(); openSearch(); return; }
  if (e.key === '?') { e.preventDefault(); openShortcuts(); return; }

  if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
    const m = (location.hash || '').match(/^#\/([a-z-]+)\/(.+)$/);
    if (!m || !T_BY_KEY[m[1]]) return;
    const days = T_BY_KEY[m[1]].days;
    const i = days.findIndex(x => x.id === m[2]);
    if (i < 0) return;
    if (e.key === 'ArrowLeft' && days[i + 1]) go('#/' + m[1] + '/' + days[i + 1].id);
    if (e.key === 'ArrowRight' && days[i - 1]) go('#/' + m[1] + '/' + days[i - 1].id);
    return;
  }

  if (e.key === 'j' || e.key === 'k') {
    if (!/^#\/[a-z-]+$/.test(location.hash || '')) return;   // list view only
    const items = Array.from(document.querySelectorAll('#app .featured, #app .row'));
    if (!items.length) return;
    const cur = items.indexOf(document.activeElement);
    let next = cur === -1 ? (e.key === 'j' ? 0 : items.length - 1) : cur + (e.key === 'j' ? 1 : -1);
    next = Math.max(0, Math.min(items.length - 1, next));
    items[next].focus();
    e.preventDefault();
  }
}

// keep Tab focus inside the drawer while it is open (a11y focus-trap)
function trapTab(e) {
  if (e.key !== 'Tab' || !elDrawer().classList.contains('open')) return;
  const list = Array.from(elDrawer().querySelectorAll('a[href], button, [tabindex]:not([tabindex="-1"])'))
    .filter(el => el.offsetParent !== null);
  if (!list.length) return;
  const first = list[0], last = list[list.length - 1];
  if (e.shiftKey && document.activeElement === first) { last.focus(); e.preventDefault(); }
  else if (!e.shiftKey && document.activeElement === last) { first.focus(); e.preventDefault(); }
}

/* ---------- counts & filtering ---------- */

function countDaysWith(days, key, value) {
  return days.reduce((n, d) => n + ((d[key] || []).includes(value) ? 1 : 0), 0);
}

function chipList(field) {
  const days = TI().days;
  const present = new Set();
  days.forEach(d => (d[field] || []).forEach(t => present.add(t)));
  return [...present]
    .map(t => ({ value: t, label: t, n: countDaysWith(days, field, t) }))
    .sort((a, b) => b.n - a.n || a.value.localeCompare(b.value));
}

function filteredDays() {
  const days = TI().days;
  if (!state.filter) return days;
  const { kind, value } = state.filter;
  const key = kind === 'ticker' ? 'tickers' : 'funds';
  return days.filter(d => (d[key] || []).includes(value));
}

function setFilter(kind, value) {
  if (state.filter && state.filter.kind === kind && state.filter.value === value) state.filter = null;
  else state.filter = { kind, value };
  const listHash = '#/' + activeKey;
  if (location.hash && location.hash !== listHash) go(listHash); // leave read view; route() renders
  else renderList();
}

/* ---------- splash / home ---------- */
// Minimal landing: one card per tier, each linking to that tier's newest piece.
function renderSplash() {
  const cards = TIERS.map(t => {
    const d = t.days[0];               // days are sorted newest-first in init()
    if (!d) {
      return `<div class="scard scard-empty">
          <div class="s-meta"><span class="s-name">${esc(t.label)}</span>
          <span class="s-date">Nothing published yet</span></div>
          <div class="s-head s-blurb">${esc(t.blurb || '')}</div></div>`;
    }
    return `<div class="scard-wrap"><a class="scard" href="#/${t.key}/${d.id}">
        <div class="s-meta">
          <span class="s-name">${esc(t.label)}${isNew(t.key, d.id) ? ' <span class="ndot"></span>' : ''}</span>
          <span class="s-date">${prettyDate(d.date)}</span>
        </div>
        <div class="s-head">${esc(d.headline)}</div>
      </a></div>`;
  }).join('');

  document.getElementById('app').innerHTML = `
    <div class="wrap splash">
      ${topbar({ minimal: true })}
      <main id="main" class="splash-main" tabindex="-1">
        <div class="splash-inner">
          <div class="splash-cards">${cards}</div>
          <div class="splash-foot">
            <button class="whatis" data-whatis>What is this?</button>
          </div>
        </div>
      </main>
    </div>`;

  wireTopbar();
  const wi = document.querySelector('#app [data-whatis]');
  if (wi) wi.addEventListener('click', openWhatIs);
}

/* "What is this?" reuses the drawer (slide-in from the right + scrim). */
function openWhatIs() {
  const tag = document.querySelector('#drawer .drawer-tag');
  if (tag) tag.textContent = 'What is this?';
  const src = document.getElementById('drawerSource');
  if (src) src.style.display = 'none';
  document.getElementById('drawerBody').innerHTML =
    '<p>Smart Money Digest tracks what billionaire investors are actually doing, straight from SEC EDGAR filings, before it becomes retail narrative.</p>' +
    '<p>Four tiers. The <strong>Daily Tape</strong> covers fresh activist 13D stakes and conviction insider buys every trading morning (quiet days publish nothing). <strong>Pattern Watch</strong> runs Saturdays and reads the week: repeat buyers, escalations, clusters the dailies could not see. The <strong>13F Deep Dive</strong> lands each quarter after the filing flood and reads 17 famous funds side by side. <strong>Fund Spotlights</strong> then take one fund’s quarter at a time, close up.</p>' +
    '<p>Everything is sourced from public filings, with links to the documents. Nothing here is investment advice.</p>' +
    '<p class="wi-tip">Tip: press <kbd>/</kbd> to search every piece, <kbd>?</kbd> for keyboard shortcuts.</p>';
  openDrawerShell();
  document.getElementById('drawerBody').scrollTop = 0;
}

/* Subscribe drawer — lists the RSS feed URLs with copy buttons (reuses the drawer shell). */
function feedBase() {
  if (typeof FEED_BASE !== 'undefined' && FEED_BASE) return FEED_BASE.replace(/\/$/, '');
  return location.origin + location.pathname.replace(/\/[^/]*$/, '');
}
function openSubscribe() {
  const base = feedBase();
  const feeds = [{ label: 'All tiers', file: 'feed.xml' }]
    .concat(TIERS.map(t => ({ label: t.label, file: 'feed-' + t.key + '.xml' })));
  const tag = document.querySelector('#drawer .drawer-tag');
  if (tag) tag.textContent = 'Subscribe';
  const src = document.getElementById('drawerSource');
  if (src) src.style.display = 'none';
  const rows = feeds.map(f => {
    const url = base + '/' + f.file;
    return `<div class="sub-row">
        <div class="sub-row-main"><span class="sub-name">${esc(f.label)}</span>
          <span class="sub-url">${esc(url)}</span></div>
        <button class="sub-copy" data-copy="${esc(url)}">Copy</button>
      </div>`;
  }).join('');
  const body = document.getElementById('drawerBody');
  body.innerHTML =
    '<p>Smart Money Digest publishes as RSS. Paste a feed URL into Readwise Reader (or any RSS app) and every new piece shows up automatically.</p>' +
    '<div class="sub-list">' + rows + '</div>' +
    '<p class="sub-hint">Use a single tier feed to follow just the Daily Tape, Pattern Watch, Deep Dives, or Spotlights.</p>';
  body.querySelectorAll('[data-copy]').forEach(b => {
    b.addEventListener('click', () => {
      const url = b.getAttribute('data-copy');
      const done = () => { b.textContent = 'Copied'; b.classList.add('done'); setTimeout(() => { b.textContent = 'Copy'; b.classList.remove('done'); }, 1400); };
      if (navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(url).then(done, done);
      else done();
    });
  });
  openDrawerShell();
  body.scrollTop = 0;
}

/* Quick-find: search headlines/subtitles/tickers/funds across ALL tiers (data is in memory). */
function openSearch() {
  const tag = document.querySelector('#drawer .drawer-tag');
  if (tag) tag.textContent = 'Search';
  const src = document.getElementById('drawerSource');
  if (src) src.style.display = 'none';
  const body = document.getElementById('drawerBody');
  body.innerHTML =
    '<input class="search-input" type="search" placeholder="Search all pieces…" aria-label="Search all pieces" autocomplete="off" spellcheck="false">' +
    '<div class="search-results" id="searchResults"></div>';
  const input = body.querySelector('.search-input');
  const results = body.querySelector('#searchResults');
  const all = TIERS.flatMap(t => t.days.map(d => ({
    t, d,
    hay: [d.headline, d.subtitle, ...(d.tickers || []), ...(d.funds || [])].join(' ').toLowerCase()
  })));
  const render = () => {
    const q = input.value.trim().toLowerCase();
    let list = all;
    if (q) { const toks = q.split(/\s+/); list = all.filter(x => toks.every(t => x.hay.includes(t))); }
    list = list.slice(0, 25);
    if (!list.length) { results.innerHTML = '<p class="empty">No pieces match.</p>'; return; }
    results.innerHTML = list.map(x =>
      `<a class="sr-row" href="#/${x.t.key}/${x.d.id}" data-go="#/${x.t.key}/${x.d.id}">` +
        `<span class="sr-meta">${esc(x.t.label)} · ${prettyDate(x.d.date)}</span>` +
        `<span class="sr-title">${esc(x.d.headline)}</span></a>`).join('');
    results.querySelectorAll('[data-go]').forEach(a =>
      a.addEventListener('click', e => { e.preventDefault(); closeDrawer(); go(a.dataset.go); }));
  };
  input.addEventListener('input', render);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') { const first = results.querySelector('[data-go]'); if (first) { e.preventDefault(); closeDrawer(); go(first.dataset.go); } }
  });
  render();
  openDrawerShell();
  setTimeout(() => input.focus(), 30);   // override the shell's focus-on-close-button
}

/* Keyboard shortcuts help (reuses the drawer). */
function openShortcuts() {
  const tag = document.querySelector('#drawer .drawer-tag');
  if (tag) tag.textContent = 'Shortcuts';
  const src = document.getElementById('drawerSource');
  if (src) src.style.display = 'none';
  document.getElementById('drawerBody').innerHTML =
    '<dl class="kbd-list">' +
    '<dt><kbd>/</kbd></dt><dd>Search all pieces</dd>' +
    '<dt><kbd>j</kbd> <kbd>k</kbd></dt><dd>Move down / up the piece list</dd>' +
    '<dt><kbd>&larr;</kbd> <kbd>&rarr;</kbd></dt><dd>Previous / next piece while reading</dd>' +
    '<dt><kbd>Esc</kbd></dt><dd>Close this panel</dd>' +
    '<dt><kbd>?</kbd></dt><dd>Show this help</dd>' +
    '</dl>';
  openDrawerShell();
}

/* Share the canonical (public, server-addressable) page for a piece. */
function shareEdition(d, btn) {
  const url = feedBase() + '/' + activeKey + '/' + d.id + '.html';
  if (navigator.share) { navigator.share({ title: d.headline, url }).catch(() => {}); return; }
  const done = () => { if (btn) { btn.textContent = 'Copied'; setTimeout(() => { btn.textContent = 'Share'; }, 1400); } };
  if (navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(url).then(done, done);
  else done();
}

/* Reading-progress bar (thin top bar); only active in a reading view. */
let _scrollRAF = 0;
function onReadScroll() {
  if (_scrollRAF) return;
  _scrollRAF = requestAnimationFrame(() => {
    _scrollRAF = 0;
    const bar = document.getElementById('readbar');
    if (!bar) return;
    const inRead = /^#\/[a-z-]+\/.+/.test(location.hash || '');
    if (!inRead) { bar.style.width = '0%'; return; }
    const h = document.documentElement.scrollHeight - window.innerHeight;
    bar.style.width = (h > 0 ? Math.min(100, (window.scrollY / h) * 100) : 0) + '%';
  });
}

/* ---------- list view ---------- */

function renderList() {
  const days = filteredDays();
  const f = state.filter;

  const tickers = chipList('tickers');
  const funds = chipList('funds');
  const shownTickers = state.showAllTickers ? tickers : tickers.slice(0, TOP_CHIPS);
  const shownFunds = state.showAllFunds ? funds : funds.slice(0, TOP_CHIPS);

  let tickerRow = shownTickers.map(c => chip('ticker', c, f)).join('');
  if (tickers.length > TOP_CHIPS) {
    tickerRow += `<button class="chip more" data-act="toggleTickers">` +
      (state.showAllTickers ? 'show fewer' : `show all (${tickers.length})`) + `</button>`;
  }
  let fundRow = shownFunds.map(c => chip('fund', c, f)).join('');
  if (funds.length > TOP_CHIPS) {
    fundRow += `<button class="chip more" data-act="toggleFunds">` +
      (state.showAllFunds ? 'show fewer' : `show all (${funds.length})`) + `</button>`;
  }

  const activeNote = f
    ? `<div class="filter-note">Filtered to <strong>${esc(f.value)}</strong>` +
      ` — ${days.length} piece${days.length === 1 ? '' : 's'} ` +
      `<button class="clear" data-act="clear">clear ✕</button></div>`
    : '';

  const featured = days[0] ? featuredCard(days[0]) : `<p class="empty">No pieces match this filter.</p>`;
  const rest = days.slice(1).map(rowItem).join('');

  document.getElementById('app').innerHTML = `
    <main id="main" class="wrap" tabindex="-1">
      ${topbar()}
      <p class="tier-blurb">${esc(TI().blurb || '')}</p>
      <section class="filters">
        <div class="filter-group">
          <span class="filter-label">Tickers</span>
          <div class="chips">${tickerRow || '<span class="muted">—</span>'}</div>
        </div>
        <div class="filter-group">
          <span class="filter-label">Funds</span>
          <div class="chips">${fundRow || '<span class="muted">—</span>'}</div>
        </div>
        ${activeNote}
      </section>
      ${featured}
      ${rest ? `<div class="list">${rest}</div>` : ''}
    </main>`;

  wireTopbar();
  document.querySelectorAll('#app [data-act]').forEach(b => {
    b.addEventListener('click', () => {
      const act = b.dataset.act;
      if (act === 'toggleTickers') { state.showAllTickers = !state.showAllTickers; renderList(); }
      else if (act === 'toggleFunds') { state.showAllFunds = !state.showAllFunds; renderList(); }
      else if (act === 'clear') { state.filter = null; renderList(); }
    });
  });
  document.querySelectorAll('#app .chip[data-kind]').forEach(c => {
    c.addEventListener('click', () => setFilter(c.dataset.kind, c.dataset.value));
  });
  document.querySelectorAll('#app [data-id]').forEach(a => {
    a.addEventListener('click', e => { e.preventDefault(); go('#/' + activeKey + '/' + a.dataset.id); });
  });
}

function chip(kind, c, f) {
  const active = f && f.kind === kind && f.value === c.value;
  return `<button class="chip${active ? ' active' : ''}" data-kind="${kind}" data-value="${esc(c.value)}">` +
    `${esc(c.label)} <span class="ct">(${c.n})</span></button>`;
}

function featuredCard(d) {
  return `<a class="featured" href="#/${activeKey}/${d.id}" data-id="${d.id}">
      <div class="kicker">Latest ${esc(TI().label)} · ${d.date}${isNew(activeKey, d.id) ? ' <span class="ndot"></span>' : ''}</div>
      <h1 class="f-title">${esc(d.headline)}</h1>
      ${d.subtitle ? `<p class="f-sub">${esc(d.subtitle)}</p>` : ''}
      <div class="f-tags">${(d.tickers || []).map(t => `<span class="tg">${esc(t)}</span>`).join('')}</div>
      <span class="keepreading">Keep reading →</span>
    </a>`;
}

function rowItem(d) {
  return `<a class="row" href="#/${activeKey}/${d.id}" data-id="${d.id}">
      <span class="r-date">${d.date}${isNew(activeKey, d.id) ? ' <span class="ndot"></span>' : ''}</span>
      <span class="r-title">${esc(d.headline)}</span>
    </a>`;
}

/* ---------- reading view ---------- */

async function renderRead(id) {
  const d = TI().days.find(x => x.id === id);
  markSeen(activeKey, id);
  const days = TI().days;
  const idx = days.findIndex(x => x.id === id);
  const older = idx >= 0 ? days[idx + 1] : null;   // older piece (further back)
  const newer = idx > 0 ? days[idx - 1] : null;    // newer piece
  const navHtml =
    (older ? `<a class="ed-prev" href="#/${activeKey}/${older.id}">← ${prettyDate(older.date)}</a>` : '<span></span>') +
    (newer ? `<a class="ed-next" href="#/${activeKey}/${newer.id}">${prettyDate(newer.date)} →</a>` : '<span></span>');

  document.getElementById('app').innerHTML = `
    <main id="main" class="wrap read" tabindex="-1">
      ${topbar()}
      <a class="back" href="#/${activeKey}" data-back>← All ${esc(TI().label)} pieces</a>
      <article class="article">
        <div class="kicker">${prettyDateFull(d.date)}<span id="readtime"></span><button class="share-btn" data-share aria-label="Share this piece">Share</button></div>
        <h1 class="a-title">${esc(d.headline)}</h1>
        ${d.subtitle ? `<p class="a-sub">${esc(d.subtitle)}</p>` : ''}
        <div class="a-tags">${(d.tickers || []).map(t => `<a class="tg" href="#" data-ticker="${esc(t)}">${esc(t)}</a>`).join('')}</div>
        <hr/>
        <div id="body" class="body"><p class="muted">loading…</p></div>
      </article>
      <nav class="edition-nav" aria-label="Pieces in this tier">${navHtml}</nav>
    </main>`;

  wireTopbar();
  document.querySelectorAll('#app [data-ticker]').forEach(a => {
    a.addEventListener('click', e => { e.preventDefault(); setFilter('ticker', a.dataset.ticker); });
  });
  const sb = document.querySelector('#app [data-share]');
  if (sb) sb.addEventListener('click', () => shareEdition(d, sb));

  let md;
  try { md = await getBody(d); }
  catch (e) { document.getElementById('body').innerHTML = `<p class="empty">Couldn't load this piece. (${esc(String(e))})</p>`; return; }

  const body = document.getElementById('body');
  body.innerHTML = marked.parse(stripTopMatter(md));
  enhance(body);
  styleTickers(body, d.tickers || []);
  buildTOC(body);

  // reading time from the rendered text (~230 wpm)
  const words = (body.textContent || '').trim().split(/\s+/).filter(Boolean).length;
  const rt = document.getElementById('readtime');
  if (rt && words) rt.textContent = ` · ${Math.max(1, Math.round(words / 230))} min read`;
}

// drop the original H1 and the metadata lines we render ourselves
function stripTopMatter(md) {
  const lines = md.split('\n');
  const out = [];
  let h1Stripped = false;
  for (const ln of lines) {
    if (!h1Stripped && /^#\s+\S/.test(ln)) { h1Stripped = true; continue; }
    if (/^\*\*(Headline|Subtitle|Tickers|Funds):\*\*/.test(ln)) continue;
    out.push(ln);
  }
  // collapse any leading blank lines / orphan rule
  return out.join('\n').replace(/^\s*(?:---\s*)?\n+/, '');
}

// build an "In this piece" jump list from the ## section headings the pieces use.
// Scroll by element ref (not a hash link) so it never collides with the app's hash router.
function buildTOC(body) {
  const secs = [];
  Array.from(body.querySelectorAll('h2')).forEach((el, i) => {
    const label = (el.textContent || '').trim();
    if (!label || label.length > 90) return;
    el.id = 'sec-' + i;
    secs.push({ id: el.id, label });
  });
  if (secs.length < 3) return;
  const toc = document.createElement('nav');
  toc.className = 'toc';
  toc.setAttribute('aria-label', 'In this piece');
  toc.innerHTML = '<div class="toc-h">In this piece</div><ul>' +
    secs.map(s => `<li><a href="#" data-toc="${s.id}">${esc(s.label)}</a></li>`).join('') + '</ul>';
  body.parentNode.insertBefore(toc, body);
  const links = {};
  toc.querySelectorAll('[data-toc]').forEach(a => {
    links[a.dataset.toc] = a;
    a.addEventListener('click', e => {
      e.preventDefault();
      const t = document.getElementById(a.dataset.toc);
      if (t) t.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
  });
  // scroll-spy: highlight the section currently near the top
  if ('IntersectionObserver' in window) {
    const obs = new IntersectionObserver(entries => {
      entries.forEach(en => {
        if (en.isIntersecting) {
          Object.values(links).forEach(l => l.classList.remove('active'));
          if (links[en.target.id]) links[en.target.id].classList.add('active');
        }
      });
    }, { rootMargin: '-84px 0px -70% 0px' });
    secs.forEach(s => { const el = document.getElementById(s.id); if (el) obs.observe(el); });
  }
}

// Pieces bold their tickers (**WBX**). Any <strong> whose text is one of this piece's
// tickers becomes a clickable filter chip (skips those inside links).
function styleTickers(scope, tickers) {
  if (!tickers.length) return;
  const set = new Set(tickers);
  scope.querySelectorAll('strong').forEach(s => {
    const t = (s.textContent || '').trim().replace(/^\$/, '');
    if (!set.has(t) || s.closest('a')) return;
    s.classList.add('cashtag', 'clickable');
    s.setAttribute('role', 'button');
    s.setAttribute('tabindex', '0');
    const fire = () => setFilter('ticker', t);
    s.addEventListener('click', fire);
    s.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); fire(); } });
  });
}

function enhance(scope) {
  scope.querySelectorAll('a').forEach(a => {
    const href = a.getAttribute('href') || '';
    if (href.startsWith('#/')) {                 // internal piece link
      a.classList.add('xlink');
      a.addEventListener('click', e => { e.preventDefault(); go(href); });
      return;
    }
    a.classList.add(/sec\.gov/.test(href) ? 'cite-sec' : 'cite-plain');
    a.target = '_blank'; a.rel = 'noopener';
  });
}

/* ---------- drawer shell ---------- */

// open the drawer and move focus into it; remember the trigger so we can restore focus on close
function openDrawerShell() {
  elDrawer()._trigger = document.activeElement;
  elDrawer().classList.add('open');
  elDrawer().setAttribute('aria-hidden', 'false');
  elScrim().hidden = false;
  const closeBtn = document.getElementById('drawerClose');
  if (closeBtn) closeBtn.focus();
}

function closeDrawer() {
  if (!elDrawer().classList.contains('open')) return;
  elDrawer().classList.remove('open');
  elDrawer().setAttribute('aria-hidden', 'true');
  elScrim().hidden = true;
  const t = elDrawer()._trigger;
  elDrawer()._trigger = null;
  if (t && typeof t.focus === 'function') t.focus();   // restore focus to the trigger
}

/* ---------- data access (embedded or fetched) ---------- */

async function getBody(day) {
  if (day.body != null) return day.body;
  return fetchText(day.path);
}

/* ---------- topbar (brand + tier nav) + theme ---------- */

function topbar(opts) {
  const minimal = !!(opts && opts.minimal);
  const sep = '<span class="sep">·</span>';
  const links = sep + TIERS.map(t =>
    `<a class="chan${t.key === activeKey ? ' active' : ''}" data-chan="${t.key}" href="#/${t.key}">${esc(t.label)}` +
    `${tierHasNew(t) ? '<span class="ndot" aria-label="new pieces"></span>' : ''}</a>`
  ).join(sep);
  const nav = minimal ? '' : `<nav class="chan-nav">${links}</nav>`;
  return `<header class="topbar${minimal ? ' minimal' : ''}">
      <a class="brand" data-home href="#/" title="Smart Money Digest home">Smart&nbsp;Money</a>
      ${nav}
      <div class="spacer"></div>
      <button class="icon-btn" data-search title="Search (press /)" aria-label="Search pieces">
        <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true"><circle cx="10.5" cy="10.5" r="6.5" fill="none" stroke="currentColor" stroke-width="2"/><line x1="15.2" y1="15.2" x2="21" y2="21" stroke="currentColor" stroke-width="2"/></svg>
      </button>
      <button class="sub-btn" data-subscribe title="Subscribe by RSS" aria-label="Subscribe by RSS">Subscribe</button>
      <button class="theme-toggle" data-theme-toggle title="Toggle light / dark"
        aria-label="Toggle light or dark theme"
        aria-pressed="${document.documentElement.getAttribute('data-theme') === 'dark'}">
        <span class="t-ico" aria-hidden="true"></span></button></header>`;
}

function wireTopbar() {
  document.querySelectorAll('#app [data-chan]').forEach(a => {
    a.addEventListener('click', e => { e.preventDefault(); goTier(a.dataset.chan); });
  });
  const back = document.querySelector('#app [data-back]');
  if (back) back.addEventListener('click', e => { e.preventDefault(); go('#/' + activeKey); });
  const home = document.querySelector('#app [data-home]');
  if (home) home.addEventListener('click', e => { e.preventDefault(); goHome(); });
  const tt = document.querySelector('#app [data-theme-toggle]');
  if (tt) tt.addEventListener('click', toggleTheme);
  const sub = document.querySelector('#app [data-subscribe]');
  if (sub) sub.addEventListener('click', openSubscribe);
  const srch = document.querySelector('#app [data-search]');
  if (srch) srch.addEventListener('click', openSearch);
}

function initTheme() {
  let t = null;
  try { t = localStorage.getItem('smd-theme'); } catch (e) {}
  if (t !== 'light' && t !== 'dark') t = 'light';
  document.documentElement.setAttribute('data-theme', t);
}
function toggleTheme() {
  const cur = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', cur);
  const tt = document.querySelector('#app [data-theme-toggle]');
  if (tt) tt.setAttribute('aria-pressed', String(cur === 'dark'));
  try { localStorage.setItem('smd-theme', cur); } catch (e) {}
}

/* ---------- utils ---------- */

function esc(s) {
  return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}
async function fetchText(path) {
  const r = await fetch(encodeURI(path), { cache: 'no-store' });
  if (!r.ok) throw new Error(r.status + ' ' + path);
  return r.text();
}
async function fetchJSON(path) { return JSON.parse(await fetchText(path)); }

// PWA: register the service worker on the served site (silently ignored on file://)
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(() => {}));
}
